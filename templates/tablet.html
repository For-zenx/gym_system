{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PerfectLine II — Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tablet.css' %}?v=1.4">
</head>
<body>

    <!-- Cámara: capa base fullscreen -->
    <video id="camera-feed" autoplay playsinline muted></video>
    <!-- Canvas para dibujar los landmarks de la IA -->
    <canvas id="overlay-canvas"></canvas>

    <!-- Overlay: nombre del sistema (esquina superior izquierda) -->
    <div id="overlay-brand" class="overlay">
        Perfect<span>Line II</span>
    </div>

    <!-- Overlay: estado de conexión (esquina superior derecha) -->
    <div id="overlay-status" class="overlay">
        <div id="status-dot"></div>
        <span id="status-text">Conectando...</span>
    </div>

    <!-- UI Enrolamiento: Marco de Enfoque Oscuro -->
    <div id="focus-frame" class="focus-frame"></div>

    <!-- UI Enrolamiento: Flechas de Dirección (SVG) -->
    <div id="arrow-left" class="nav-arrow arrow-left hidden">
        <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
    </div>
    <div id="arrow-right" class="nav-arrow arrow-right hidden">
        <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
    </div>

    <!-- UI Enrolamiento: HUD de Instrucciones -->
    <div id="hud-instruction" class="hud-bubble hidden">
        <span id="hud-text">Cargando...</span>
    </div>

    <!-- Inyectar la URL del WebSocket desde Django al contexto JS -->
    <script>
        window.TABLET_WS_URL = "{{ ws_url }}";
    </script>
    <script src="{% static 'vendor/face-api.min.js' %}"></script>
    <script src="{% static 'js/tablet.js' %}?v=1.2"></script>

</body>
</html>
