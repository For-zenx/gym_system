<div class="modal-overlay" id="quickChargeModal">
    <div class="modal-content modal-content-search">
        {% include "includes/modal_header.html" with modal_title="Registrar cobro rápido" %}
        
        <div class="modal-body">
            <div class="quick-search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" 
                           id="quick-charge-search" 
                           class="quick-search-input" 
                           placeholder="Buscar por nombre, cédula o código..." 
                           autocomplete="off">
                </div>
                
                <div id="quick-charge-results" class="quick-search-results" hidden>
                    <!-- Los resultados se cargarán aquí vía JS -->
                </div>
                
                <div id="quick-charge-empty" class="quick-search-empty" hidden>
                    No se encontraron resultados.
                </div>

                <div id="quick-charge-loading" class="quick-search-loading" hidden>
                    Buscando...
                </div>
            </div>
            <p class="quick-search-help">
                Busque un afiliado, empleado o entrenador para iniciar el cobro.
            </p>
        </div>
    </div>
</div>
